<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gold Crown Studio</title>
  <script>
    // GitHub Pages SPA redirect — preserves full path + query string into hash
    // e.g. /TheGoldCrownStudio/offers?ref=Priya&phone=98765
    //   →  /TheGoldCrownStudio/#/offers?ref=Priya&phone=98765
    // HashRouter then picks up #/offers?ref=Priya&phone=98765 correctly.
    (function() {
      var l = window.location;
      var base = '/TheGoldCrownStudio';
      // Strip the base prefix from the path to get the route
      var route = l.pathname.replace(base, '') || '/';
      // Reconstruct: origin + base + /# + route + query + hash
      l.replace(l.origin + base + '/#' + route + l.search + l.hash);
    })();
  </script>
</head>
<body></body>
</html>
